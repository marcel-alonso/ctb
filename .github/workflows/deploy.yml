name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v3
        
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create _site directory
        run: |
          mkdir -p _site
          # Copiar arquivos estáticos da raiz (excluindo pastas de código e o próprio _site)
          cp -r assets css js index.html CNAME favicon.ico robots.txt .htaccess google7ff159491cb1da82.html _site/ 2>/dev/null || true

      - name: Build Blog
        run: |
          npm install
          npm run build
          # Copiar resultados do blog para _site
          cp -r blog posts.json rss.xml sitemap.xml _site/ 2>/dev/null || true

      - name: Build Landing Page
        run: |
          cd terrabambu-lp
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3