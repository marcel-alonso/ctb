name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v3
        
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create _site directory
        run: |
          mkdir -p _site/lp/forros-bambu
          mkdir -p _site/blog
          
          echo "Copying static root files..."
          cp index.html CNAME favicon.ico robots.txt .htaccess google7ff159491cb1da82.html _site/ 2>/dev/null || true
          cp -r assets css js _site/ 2>/dev/null || true

      - name: Build Blog
        run: |
          npm install
          npm run build
          echo "Copying blog artifacts..."
          cp -r blog/* _site/blog/ 2>/dev/null || true
          cp posts.json rss.xml sitemap.xml _site/ 2>/dev/null || true

      - name: Build Landing Page
        run: |
          cd terrabambu-lp
          npm install
          npm run build
          # O vite já está configurado para buildar em ../_site/lp/forros-bambu

      - name: List _site content (Debug)
        run: ls -R _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3